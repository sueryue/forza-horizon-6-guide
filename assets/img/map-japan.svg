<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1000 620" role="img" aria-label="Forza Horizon 6 - Horizon Japan festival map (original illustration)">
  <defs>
    <linearGradient id="ocean" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#06051a"/>
      <stop offset="100%" stop-color="#0e0a26"/>
    </linearGradient>
    <linearGradient id="land" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#103048"/>
      <stop offset="100%" stop-color="#0a1828"/>
    </linearGradient>
    <linearGradient id="fujiG" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1d44"/>
      <stop offset="100%" stop-color="#140d28"/>
    </linearGradient>
    <radialGradient id="sunG" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="55%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff9a3c" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="50" height="50" patternUnits="userSpaceOnUse">
      <path d="M50 0H0V50" fill="none" stroke="#1de9ff" stroke-width="1" opacity="0.06"/>
    </pattern>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1000" height="620" fill="url(#ocean)"/>
  <rect width="1000" height="620" fill="url(#grid)"/>

  <!-- main island -->
  <path d="M 250 150 C 360 100 520 105 640 140 C 760 175 845 230 862 322 C 878 404 822 472 720 502 C 600 538 430 542 320 502 C 210 462 150 380 162 290 C 170 222 190 180 250 150 Z"
        fill="url(#land)" stroke="#1de9ff" stroke-width="2" opacity="0.95" filter="url(#glow)"/>
  <!-- legend island (separate) -->
  <path d="M 850 150 q 30 -22 64 -8 q 33 12 20 44 q -16 28 -54 20 q -38 -8 -30 -56 z"
        fill="url(#land)" stroke="#ff4fd8" stroke-width="2" opacity="0.95" filter="url(#glow)"/>

  <!-- region zones (translucent) -->
  <ellipse cx="700" cy="372" rx="118" ry="74" fill="#1de9ff" opacity="0.10"/>
  <ellipse cx="300" cy="442" rx="124" ry="82" fill="#4ade80" opacity="0.10"/>
  <ellipse cx="432" cy="286" rx="138" ry="126" fill="#e9e6ff" opacity="0.08"/>
  <ellipse cx="882" cy="166" rx="64" ry="50" fill="#ff4fd8" opacity="0.12"/>

  <!-- festival route -->
  <path d="M 885 160 Q 792 262 700 360 Q 560 300 432 250 Q 360 360 300 440"
        fill="none" stroke="#ffd166" stroke-width="3" stroke-dasharray="2 11"
        stroke-linecap="round" opacity="0.92" filter="url(#glow)"/>

  <!-- Mount Fuji -->
  <circle cx="470" cy="200" r="120" fill="url(#sunG)" opacity="0.8"/>
  <polygon points="322,360 432,176 542,360" fill="url(#fujiG)"/>
  <polygon points="400,250 432,176 464,250 448,238 436,252 422,236 410,250" fill="#e9e6ff" opacity="0.96"/>

  <!-- Tokyo neon skyline cluster -->
  <g opacity="0.96">
    <rect x="628" y="338" width="34" height="74" fill="#0a0818"/>
    <rect x="668" y="312" width="40" height="100" fill="#0a0818"/>
    <rect x="712" y="350" width="30" height="62" fill="#0a0818"/>
    <rect x="748" y="326" width="38" height="86" fill="#0a0818"/>
    <rect x="792" y="356" width="26" height="56" fill="#0a0818"/>
    <g filter="url(#glow)">
      <rect x="638" y="350" width="5" height="5" fill="#36e0ff"/>
      <rect x="648" y="366" width="5" height="5" fill="#ff4fd8"/>
      <rect x="678" y="328" width="5" height="5" fill="#ff4fd8"/>
      <rect x="688" y="350" width="5" height="5" fill="#36e0ff"/>
      <rect x="722" y="366" width="5" height="5" fill="#36e0ff"/>
      <rect x="758" y="342" width="5" height="5" fill="#ff4fd8"/>
      <rect x="770" y="364" width="5" height="5" fill="#36e0ff"/>
      <rect x="800" y="372" width="5" height="5" fill="#ff4fd8"/>
    </g>
  </g>

  <!-- Rural Japan: estate + hills -->
  <g opacity="0.95">
    <path d="M 250 470 q 40 -26 80 0 q 40 26 80 0 v 30 h -160 z" fill="#0d2018"/>
    <rect x="296" y="430" width="48" height="34" fill="#120a1c" stroke="#4ade80" stroke-width="1.4"/>
    <path d="M 292 430 l 28 -18 l 28 18 z" fill="#0d2018" stroke="#4ade80" stroke-width="1.2"/>
    <rect x="312" y="442" width="10" height="10" fill="#4ade80" opacity="0.8"/>
    <rect x="324" y="442" width="10" height="10" fill="#4ade80" opacity="0.8"/>
  </g>

  <!-- Legend island star marker -->
  <g transform="translate(882,166)" filter="url(#glow)">
    <path d="M0 -14 L4 -4 L14 -4 L6 3 L9 13 L0 7 L-9 13 L-6 3 L-14 -4 L-4 -4 Z" fill="#ff4fd8"/>
  </g>

  <!-- region pins -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" font-weight="700" font-size="15">
    <!-- Tokyo -->
    <g transform="translate(700,360)">
      <path d="M0 0 C -9 -20 -9 -32 0 -32 C 9 -32 9 -20 0 0 Z" fill="#0a0818" stroke="#1de9ff" stroke-width="2"/>
      <circle cx="0" cy="-20" r="5.5" fill="#1de9ff"/>
      <text x="0" y="-42" text-anchor="middle" fill="#eafcff">Tokyo</text>
    </g>
    <!-- Rural Japan -->
    <g transform="translate(300,440)">
      <path d="M0 0 C -9 -20 -9 -32 0 -32 C 9 -32 9 -20 0 0 Z" fill="#0a0818" stroke="#4ade80" stroke-width="2"/>
      <circle cx="0" cy="-20" r="5.5" fill="#4ade80"/>
      <text x="0" y="-42" text-anchor="middle" fill="#eafff1">Rural Japan</text>
    </g>
    <!-- Mt Fuji -->
    <g transform="translate(432,250)">
      <path d="M0 0 C -9 -20 -9 -32 0 -32 C 9 -32 9 -20 0 0 Z" fill="#0a0818" stroke="#e9e6ff" stroke-width="2"/>
      <circle cx="0" cy="-20" r="5.5" fill="#e9e6ff"/>
      <text x="0" y="-42" text-anchor="middle" fill="#f3f1ff">Mount Fuji</text>
    </g>
    <!-- Legend Island -->
    <g transform="translate(882,166)">
      <path d="M0 18 C -9 -2 -9 -14 0 -14 C 9 -14 9 -2 0 18 Z" fill="#0a0818" stroke="#ff4fd8" stroke-width="2"/>
      <circle cx="0" cy="-4" r="5.5" fill="#ff4fd8"/>
      <text x="0" y="-22" text-anchor="middle" fill="#ffeaff">Legend Island</text>
    </g>
  </g>

  <!-- compass -->
  <g transform="translate(70,560)" opacity="0.9">
    <circle r="26" fill="#0a0818" stroke="#1de9ff" stroke-width="1.5" opacity="0.7"/>
    <path d="M0 -20 L6 4 L0 -2 L-6 4 Z" fill="#ff4fd8"/>
    <text x="0" y="-30" text-anchor="middle" font-family="Segoe UI, Arial, sans-serif" font-size="12" font-weight="700" fill="#eafcff">N</text>
  </g>

  <!-- title stamp -->
  <g font-family="Segoe UI, Helvetica, Arial, sans-serif" opacity="0.95">
    <text x="36" y="52" font-size="26" font-weight="800" letter-spacing="2" fill="#eafcff">HORIZON JAPAN</text>
    <text x="38" y="74" font-size="13" font-weight="600" letter-spacing="4" fill="#ffd166">FESTIVAL MAP</text>
  </g>
</svg>
