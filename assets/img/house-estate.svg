<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 340" role="img" aria-label="Forza Horizon 6 - The Estate property (original illustration)">
  <defs>
    <linearGradient id="esky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0820"/>
      <stop offset="45%" stop-color="#3a0d4f"/>
      <stop offset="78%" stop-color="#b3245f"/>
      <stop offset="100%" stop-color="#ff7a3c"/>
    </linearGradient>
    <linearGradient id="efuji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1d44"/>
      <stop offset="100%" stop-color="#140d28"/>
    </linearGradient>
    <radialGradient id="esun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="60%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff9a3c" stop-opacity="0"/>
    </radialGradient>
    <filter id="eglow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="5" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="340" fill="url(#esky)"/>
  <g fill="#ffffff" opacity="0.8">
    <circle cx="70" cy="40" r="1.4"/><circle cx="160" cy="60" r="1.1"/><circle cx="300" cy="34" r="1.3"/>
    <circle cx="470" cy="54" r="1.2"/><circle cx="540" cy="36" r="1.5"/><circle cx="230" cy="80" r="1.1"/>
  </g>
  <circle cx="430" cy="120" r="120" fill="url(#esun)" opacity="0.85"/>

  <!-- Mt Fuji backdrop -->
  <polygon points="300,210 410,70 520,210" fill="url(#efuji)"/>
  <polygon points="378,140 410,70 442,140 426,128 414,142 400,126 388,140" fill="#e9e6ff" opacity="0.96"/>

  <!-- mountainside -->
  <path d="M0 250 Q 150 210 300 244 Q 460 280 600 232 L600 340 L0 340 Z" fill="#0a0f1e"/>
  <path d="M0 250 Q 150 210 300 244 Q 460 280 600 232" fill="none" stroke="#1de9ff" stroke-width="1.5" opacity="0.45" filter="url(#eglow)"/>

  <!-- estate platform -->
  <rect x="150" y="252" width="320" height="14" rx="3" fill="#14102a" stroke="#2a2440" stroke-width="1"/>
  <!-- villa -->
  <rect x="244" y="176" width="138" height="78" fill="#161033" stroke="#3a2f5e" stroke-width="1.5"/>
  <rect x="262" y="146" width="92" height="34" fill="#1c1440" stroke="#3a2f5e" stroke-width="1.5"/>
  <!-- roof eaves -->
  <path d="M236 178 L300 148 L364 178 Z" fill="#0e0a22" stroke="#ff4fd8" stroke-width="1.4" opacity="0.9"/>
  <rect x="234" y="170" width="146" height="9" rx="2" fill="#0e0a22"/>
  <!-- glowing windows -->
  <g filter="url(#eglow)">
    <rect x="256" y="192" width="26" height="26" fill="#36e0ff"/>
    <rect x="296" y="192" width="26" height="26" fill="#ff4fd8"/>
    <rect x="336" y="192" width="22" height="26" fill="#36e0ff"/>
    <rect x="276" y="154" width="20" height="18" fill="#ffd166"/>
    <rect x="312" y="154" width="20" height="18" fill="#36e0ff"/>
  </g>
  <!-- door -->
  <rect x="296" y="216" width="26" height="38" fill="#0a0818" stroke="#4ade80" stroke-width="1.3"/>
  <!-- pine + lantern -->
  <g opacity="0.95">
    <rect x="196" y="232" width="4" height="22" fill="#3a2f1a"/>
    <path d="M198 214 l16 18 l-32 0 z" fill="#1c5a36"/>
    <path d="M198 200 l13 15 l-26 0 z" fill="#237045"/>
    <circle cx="174" cy="236" r="5" fill="#ff4fd8" filter="url(#eglow)"/>
  </g>
  <!-- car in driveway -->
  <g transform="translate(388,250)">
    <path d="M0 14 q4 -14 30 -16 l22 -2 q14 1 22 12 l8 6 q3 4 -2 5 l-86 0 q-3 -3 0 -5 z" fill="#0d0d18"/>
    <circle cx="20" cy="18" r="7" fill="#050507" stroke="#222" stroke-width="2"/>
    <circle cx="78" cy="18" r="7" fill="#050507" stroke="#222" stroke-width="2"/>
    <rect x="40" y="6" width="26" height="6" rx="2" fill="#36e0ff" opacity="0.8" filter="url(#eglow)"/>
  </g>

  <text x="26" y="314" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="20" font-weight="800" letter-spacing="2" fill="#eafcff">THE ESTATE</text>
  <text x="28" y="330" font-family="Segoe UI, Helvetica, Arial, sans-serif" font-size="11" font-weight="600" letter-spacing="3" fill="#ffd166">YOUR MOUNTAINSIDE HOME</text>
</svg>
