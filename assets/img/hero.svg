    <rect x="132" y="270" width="60" height="90"/>
    <rect x="200" y="190" width="40" height="170"/>
    <rect x="248" y="240" width="80" height="120"/>
    <rect x="336" y="160" width="52" height="200"/>
    <rect x="396" y="220" width="64" height="140"/>
    <rect x="468" y="200" width="44" height="160"/>
    <rect x="1010" y="230" width="70" height="130"/>
    <rect x="1088" y="190" width="50" height="170"/>
    <rect x="1146" y="250" width="54" height="110"/>
