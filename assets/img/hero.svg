<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 460" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Forza Horizon 6 - Horizon Japan key art">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0a0820"/>
      <stop offset="42%" stop-color="#3a0d4f"/>
      <stop offset="72%" stop-color="#b3245f"/>
      <stop offset="100%" stop-color="#ff7a3c"/>
    </linearGradient>
    <radialGradient id="sun" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#fff3c4"/>
      <stop offset="55%" stop-color="#ffd166"/>
      <stop offset="100%" stop-color="#ff9a3c" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="fuji" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#2a1d44"/>
      <stop offset="100%" stop-color="#140d28"/>
    </linearGradient>
    <filter id="glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="6" result="b"/>
      <feMerge><feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="1200" height="460" fill="url(#sky)"/>

  <g fill="#ffffff" opacity="0.8">
