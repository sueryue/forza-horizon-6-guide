    <circle cx="1080" cy="90" r="1.6"/><circle cx="60" cy="120" r="1.2"/>
  </g>

  <circle cx="880" cy="170" r="160" fill="url(#sun)" opacity="0.9"/>
  <circle cx="880" cy="170" r="86" fill="#ffd166" filter="url(#glow)"/>

  <polygon points="250,330 600,120 950,330" fill="url(#fuji)"/>
  <polygon points="545,168 600,120 655,168 632,160 615,172 596,158 575,172 558,160" fill="#e9e6ff" opacity="0.92"/>
  <rect x="250" y="320" width="700" height="20" fill="#1a1230" opacity="0.5"/>

  <g fill="#0a0818">
    <rect x="0" y="250" width="70" height="110"/>
