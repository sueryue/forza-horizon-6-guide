  <rect x="0" y="360" width="1200" height="100" fill="#07060f"/>
  <line x1="0" y1="412" x2="1200" y2="412" stroke="#00e5ff" stroke-width="3" opacity="0.7" filter="url(#glow)"/>
  <g stroke="#13304a" stroke-width="2" opacity="0.6">
    <line x1="600" y1="412" x2="520" y2="460"/>
