      <h1>Forza Horizon 6 Guide — Horizon Japan</h1>
      <p>A strategy guide for Forza Horizon 6: cars, barn finds, treasure cars, aftermarket &amp; Forza Edition cars, the Estate, the interactive Japan map, and a beginner's path to Horizon Legend. (This text-only version appears when JavaScript is disabled; enable JS for the full interactive guide.)</p>

      <h2>Key facts</h2>
      <ul>
        <li>Setting: a fictionalised Japan with the largest open-world map in the series.</li>
        <li>Released: May 19, 2026 (Premium early access May 15, 2026).</li>
        <li>Cars at launch: 550+.</li>
        <li>Developer: Playground Games (with Turn 10 Studios). Publisher: Xbox Game Studios.</li>
        <li>Platforms: Windows, Xbox Series X|S, PlayStation 5.</li>
        <li>8 garages act as fast-travel / car-display points; the headline property is The Estate.</li>
        <li>The Eliminator supports up to 72 players.</li>
      </ul>

      <h2>Beginner's path (14 steps to Horizon Legend)</h2>
      <ol>
        <li>Qualify, then run the Horizon Invitational for your first (Yellow) Wristband.</li>
        <li>Pick a starter: Silvia K'S (drift), Celica GT-Four (balance), or GMC Jimmy (off-road).</li>
        <li>Don't blow credits at the Autoshow — events hand out cars fast.</li>
        <li>Earn Discover Japan stamps by exploring and photographing landmarks.</li>
        <li>Farm mascots for credits as you drive.</li>
        <li>Buy Aftermarket Cars from green CT icons on the minimap.</li>
        <li>Use ANNA to drive you, or Cinema Mode for clean screenshots.</li>
        <li>Nail Drag Meets with handbrake + launch control.</li>
        <li>Three-star PR stunts for Super Wheelspins and Skill Points.</li>
        <li>Higher difficulty + assists off pays up to +125% credits.</li>
        <li>Photo everything for Horizon Promo and journal stamps.</li>
        <li>Fast-travel to anywhere you've already visited.</li>
        <li>Unlock and build The Estate in rural Japan.</li>
        <li>Run the Treasure &amp; Barn loop (photo clues and stamp-gated rumours).</li>
      </ol>

      <h2>Confirmed cars (Wikipedia)</h2>
      <ul>
        <li>2025 Toyota GR GT Prototype — cover car.</li>
        <li>2024 Toyota Land Cruiser 250 — key art.</li>
        <li>2021 Mercedes-AMG One — Forza Horizon 5 loyalty reward.</li>
        <li>2016 Aston Martin Vulcan — Forza Horizon 4 loyalty reward.</li>
        <li>2016 Lamborghini Centenario LP 770-4 — Forza Horizon 3 loyalty reward.</li>
        <li>2014 Lamborghini Huracán LP 610-4 — Forza Horizon 2 loyalty reward.</li>
        <li>2013 Dodge SRT Viper GTS — Forza Horizon 1 loyalty reward.</li>
        <li>2024 Chevrolet Corvette E-Ray — Forza Motorsport (2023) loyalty reward.</li>
      </ul>

      <h2>Map regions</h2>
      <p>Tokyo (≈5× prior city areas: Shibuya Crossing, Ginko Avenue, Tokyo Tower, elevated highways), Legend Island (Gold Wristband unlock), Rural Japan (home of The Estate), and Mount Fuji as a backdrop landmark. Community guides report 10 regions total.</p>

      <h2>Barn Finds &amp; Treasure Cars</h2>
      <p>Barn Finds: 14 classic cars (community-reported), gated behind Discover Japan stamps. Treasure Cars: 9 abandoned vehicles found via photo clues (no marker until discovered). Counts are community-reported; Wikipedia is silent on both.</p>

      <h2>Critical reception</h2>
      <p>Universal acclaim — Metacritic 90/100 (PC) and 91/100 (Xbox Series X/S); OpenCritic 100% recommend across 142 reviews. IGN scored 10/10.</p>
